<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study GraphRAG</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e6f0;
      --text-muted: #8b8fa3;
      --accent: #6c8cff;
      --accent-hover: #8ba3ff;
      --success: #4ade80;
      --error: #f87171;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    header .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 500;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-left: auto;
    }
    .status-dot.ok { background: var(--success); }
    .status-dot.degraded { background: var(--error); }

    /* Chat area */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat:empty::after {
      content: "Ask a biomedical question to get started.";
      color: var(--text-muted);
      text-align: center;
      margin-top: 60px;
      font-size: 14px;
    }

    /* Message bubbles */
    .msg {
      max-width: 780px;
      width: fit-content;
      animation: fadeIn 0.25s ease;
    }
    .msg.user {
      align-self: flex-end;
    }
    .msg.bot {
      align-self: flex-start;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      padding: 0 4px;
    }
    .msg.user .label { text-align: right; }

    /* Answer content */
    .answer-text {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .context-section {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .context-toggle {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      user-select: none;
    }
    .context-toggle:hover { color: var(--accent-hover); }
    .context-content {
      display: none;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
      padding: 10px;
      line-height: 1.5;
    }
    .context-content.open { display: block; }
    .entities {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .entities strong { color: var(--accent); }

    /* Loading */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); }
      40% { transform: scale(1); }
    }

    /* Error */
    .error-bubble {
      padding: 12px 16px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      color: var(--error);
      font-size: 13px;
    }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }
    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus {
      border-color: var(--accent);
    }
    .input-row input::placeholder {
      color: var(--text-muted);
    }
    .input-row button {
      padding: 12px 24px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .input-row button:hover { background: var(--accent-hover); }
    .input-row button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 600px) {
      .chat { padding: 16px; }
      .input-area { padding: 12px 16px; }
      .input-row button { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Study GraphRAG</h1>
    <span class="badge">Biomedical</span>
    <span class="status-dot" id="statusDot" title="Checking Neo4j connection..."></span>
  </header>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <form class="input-row" id="form" autocomplete="off">
      <input
        type="text"
        id="input"
        placeholder="e.g. What drugs target BRCA1?"
        required
      />
      <button type="submit" id="submitBtn">Ask</button>
    </form>
  </div>

  <script>
    const chat     = document.getElementById("chat");
    const form     = document.getElementById("form");
    const input    = document.getElementById("input");
    const submitBtn = document.getElementById("submitBtn");
    const statusDot = document.getElementById("statusDot");

    // ------------------------------------------------------------------
    // Health check on load
    // ------------------------------------------------------------------
    fetch("/api/health")
      .then(r => r.json())
      .then(data => {
        statusDot.className = "status-dot " + (data.neo4j ? "ok" : "degraded");
        statusDot.title = data.neo4j
          ? "Neo4j connected"
          : "Neo4j disconnected";
      })
      .catch(() => {
        statusDot.className = "status-dot degraded";
        statusDot.title = "Server unreachable";
      });

    // ------------------------------------------------------------------
    // Append chat message
    // ------------------------------------------------------------------
    function addMessage(role, html) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addUserMessage(text) {
      addMessage("user", `
        <div class="label">You</div>
        <div class="bubble">${escapeHtml(text)}</div>
      `);
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "msg bot";
      div.id = "typing";
      div.innerHTML = `
        <div class="label">GraphRAG</div>
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    function addBotMessage(question, answer, context, entities) {
      const contextId = "ctx-" + Date.now();
      const entityText = entities && entities.length
        ? `<div class="entities">Detected: ${entities.map(e =>
            `<strong>${escapeHtml(e.name)}</strong> (${escapeHtml(e.type)})`
          ).join(", ")}</div>`
        : "";

      addMessage("bot", `
        <div class="label">GraphRAG</div>
        <div class="bubble">
          <div class="answer-text">${escapeHtml(answer)}</div>
          ${entityText}
          <div class="context-section">
            <span class="context-toggle" onclick="toggleContext('${contextId}')">
              &#9654; Show supporting triples
            </span>
            <div class="context-content" id="${contextId}">${escapeHtml(context)}</div>
          </div>
        </div>
      `);
    }

    function addErrorMessage(text) {
      addMessage("bot", `
        <div class="label">GraphRAG</div>
        <div class="error-bubble">${escapeHtml(text)}</div>
      `);
    }

    // ------------------------------------------------------------------
    // Toggle context triples
    // ------------------------------------------------------------------
    window.toggleContext = function(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle("open");
    };

    // ------------------------------------------------------------------
    // Utils
    // ------------------------------------------------------------------
    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // ------------------------------------------------------------------
    // Submit
    // ------------------------------------------------------------------
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      input.value = "";
      submitBtn.disabled = true;

      addUserMessage(question);
      addTyping();

      try {
        const res = await fetch("/api/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json();
          addErrorMessage(err.detail || "Request failed.");
          return;
        }

        const data = await res.json();
        addBotMessage(
          data.question,
          data.answer,
          data.context,
          data.linked_entities
        );
      } catch (err) {
        removeTyping();
        addErrorMessage("Network error: could not reach the server.");
      } finally {
        submitBtn.disabled = false;
        input.focus();
      }
    });
  </script>

</body>
</html>
